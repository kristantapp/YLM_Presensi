<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Absensi - Yayasan Lembaga Miryam</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #001f3f 0%, #0047ab 100%);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #0047ab 0%, #001f3f 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #001f3f;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        input[type="time"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        select:focus {
            outline: none;
            border-color: #0047ab;
            box-shadow: 0 0 0 3px rgba(0, 71, 171, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0047ab 0%, #003d82 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 71, 171, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            box-shadow: 0 10px 25px rgba(108, 117, 125, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
        }

        .btn-success:hover {
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 10px 25px rgba(220, 53, 69, 0.3);
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
            margin-top: 5px;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #0047ab;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        .location-status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .location-status.allowed {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .location-status.not-allowed {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .location-status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status-icon {
            font-size: 18px;
            font-weight: bold;
        }

        .camera-preview {
            width: 100%;
            border-radius: 12px;
            margin: 15px 0;
            background: #000;
            display: none;
        }

        .camera-preview.active {
            display: block;
        }

        .photo-preview {
            width: 100%;
            border-radius: 12px;
            margin: 15px 0;
            display: none;
            border: 2px solid #0047ab;
        }

        .photo-preview.active {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group button {
            flex: 1;
            margin-top: 0;
        }

        .user-info {
            background: linear-gradient(135deg, #0047ab15 0%, #003d8215 100%);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #0047ab;
        }

        .user-info p {
            margin: 5px 0;
            color: #001f3f;
            font-size: 14px;
        }

        .user-info strong {
            color: #0047ab;
        }

        .attendance-record {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #0047ab;
        }

        .attendance-record h4 {
            color: #001f3f;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .attendance-record p {
            color: #555;
            font-size: 13px;
            margin: 4px 0;
        }

        .attendance-record .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-badge.hadir {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.pulang {
            background: #cfe2ff;
            color: #084298;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0047ab;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            text-align: center;
            color: #0047ab;
            font-weight: 600;
            margin-top: 10px;
        }

        .school-selector {
            background: linear-gradient(135deg, #f0f4f915 0%, #e8ecf015 100%);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }

        .school-selector h3 {
            color: #001f3f;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .school-info {
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 3px solid #0047ab;
        }

        .school-info p {
            color: #555;
            font-size: 13px;
            margin: 4px 0;
        }

        .school-info strong {
            color: #0047ab;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 20px;
            }

            .content {
                padding: 20px 15px;
            }

            button {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="container">
   <div class="header">
    <h1>📍 Absensi Pegawai</h1>
    <p>Yayasan Lembaga Miryam</p>
   </div>
   <div class="content">
    <!-- SECTION: LOGIN -->
    <div class="section active" id="loginSection">
     <div class="alert alert-danger" id="loginAlert"></div>
     <div class="form-group">
      <label>Username</label> <input type="text" id="loginUsername" placeholder="Masukkan username Anda">
     </div>
     <div class="form-group">
      <label>Password</label> <input type="password" id="loginPassword" placeholder="Masukkan password Anda">
     </div><button onclick="handleLogin()">Login</button>
    </div><!-- SECTION: LOCATION CHECK -->
    <div class="section" id="locationSection">
     <div class="location-status loading" id="locationStatus">
      <span class="status-icon">📍</span> <span id="locationStatusText">Mendeteksi lokasi Anda...</span>
     </div>
     <div class="school-selector">
      <h3>Lokasi Sekolah</h3>
      <div class="school-info" id="schoolInfo"></div>
     </div><button class="btn-secondary" onclick="checkLocationAgain()">Periksa Ulang Lokasi</button> <button class="btn-secondary" onclick="handleLogout()">Logout</button>
    </div><!-- SECTION: ATTENDANCE -->
    <div class="section" id="attendanceSection">
     <div class="alert alert-danger" id="attendanceAlert"></div>
     <div class="user-info">
      <p><strong>Nama:</strong> <span id="attendanceName"></span></p>
      <p><strong>Jabatan:</strong> <span id="attendancePosition"></span></p>
      <p><strong>Sekolah:</strong> <span id="attendanceSchool"></span></p>
     </div>
     <div class="form-group">
      <label>Tipe Absensi</label> <select id="attendanceType"> <option value="">-- Pilih Tipe Absensi --</option> <option value="Hadir">Masuk Kerja (Hadir)</option> <option value="Pulang">Pulang Kerja (Pulang)</option> </select>
     </div>
     <div class="form-group">
      <label>Ambil Foto Selfie</label>
      <video id="cameraPreview" class="camera-preview"></video><img id="photoPreview" class="photo-preview"> <button type="button" class="btn-secondary" id="toggleCameraBtn" onclick="toggleCamera()">Buka Kamera</button> <button type="button" class="btn-secondary" onclick="capturePhoto()" style="display: none;" id="captureBtn">Ambil Foto</button> <button type="button" class="btn-secondary" onclick="retakePhoto()" style="display: none;" id="retakeBtn">Ambil Ulang</button>
     </div><button class="btn-success" onclick="submitAttendance()">Kirim Absensi</button> <button class="btn-secondary" onclick="goToHistory()">Riwayat Absensi</button> <button class="btn-secondary" onclick="handleLogout()">Logout</button>
    </div><!-- SECTION: HISTORY -->
    <div class="section" id="historySection">
     <div class="alert alert-info" id="historyInfo"></div>
     <div id="attendanceHistory"></div><button class="btn-secondary" onclick="goToAttendance()">Kembali ke Absensi</button>
    </div>
   </div>
  </div>
  <script>
        // ===== KONFIGURASI =====
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyXCrdqLFQJluPynIw1lYA2-j_xzFU6cOh8Lpx4cytp4fIjjCsQDK4WtvL_ygoI-tsP/exec';
        
        // ===== STATE MANAGEMENT =====
        let currentUser = null;
        let currentSchool = null;
        let userLocation = null;
        let photoCaptured = false;
        let photoBlob = null;
        let stream = null;

        // ===== UTILITY FUNCTIONS =====
        function showAlert(elementId, message, type = 'danger') {
            const alertEl = document.getElementById(elementId);
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 5000);
        }

        function navigateTo(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const φ1 = (lat1 * Math.PI) / 180;
            const φ2 = (lat2 * Math.PI) / 180;
            const Δφ = ((lat2 - lat1) * Math.PI) / 180;
            const Δλ = ((lon2 - lon1) * Math.PI) / 180;
            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // ===== GEOLOCATION =====
        function getLocation() {
            document.getElementById('locationStatusText').textContent = 'Mendeteksi lokasi Anda...';
            document.getElementById('locationStatus').className = 'location-status loading';

            if (!navigator.geolocation) {
                showAlert('attendanceAlert', 'Geolocation tidak didukung di browser Anda', 'danger');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    };
                    checkLocationValidity();
                },
                (error) => {
                    showAlert('attendanceAlert', `Error mendapatkan lokasi: ${error.message}`, 'danger');
                    document.getElementById('locationStatusText').textContent = 'Gagal mendeteksi lokasi';
                    document.getElementById('locationStatus').className = 'location-status not-allowed';
                }
            );
        }

        function checkLocationValidity() {
            if (!userLocation || !currentSchool) return;

            const distance = calculateDistance(
                userLocation.lat,
                userLocation.lon,
                parseFloat(currentSchool.latitude),
                parseFloat(currentSchool.longitude)
            );

            const radiusMeters = parseFloat(currentSchool.radiusMeters) || 100;
            const isInZone = distance <= radiusMeters;

            const statusEl = document.getElementById('locationStatus');
            const statusText = document.getElementById('locationStatusText');

            if (isInZone) {
                statusEl.className = 'location-status allowed';
                statusText.textContent = `✓ Anda berada dalam zona absensi (${distance.toFixed(0)}m dari sekolah)`;
                navigateTo('attendanceSection');
            } else {
                statusEl.className = 'location-status not-allowed';
                statusText.textContent = `✗ Anda di luar zona absensi (${distance.toFixed(0)}m, batas: ${radiusMeters}m)`;
                navigateTo('attendanceSection');
            }
        }

        function checkLocationAgain() {
            getLocation();
        }

        // ===== CAMERA =====
        async function toggleCamera() {
            const toggleBtn = document.getElementById('toggleCameraBtn');
            const captureBtn = document.getElementById('captureBtn');
            const video = document.getElementById('cameraPreview');

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                video.classList.remove('active');
                toggleBtn.textContent = 'Buka Kamera';
                captureBtn.style.display = 'none';
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                
                // Set explicit width dan height untuk video element
                video.width = 1280;
                video.height = 720;
                
                // Pastikan autoplay dan playsinline berfungsi
                video.setAttribute('autoplay', 'true');
                video.setAttribute('playsinline', 'true');
                video.setAttribute('muted', 'true');
                
                // Tunggu track video siap
                stream.getVideoTracks()[0].onended = () => {
                    stream = null;
                    video.classList.remove('active');
                    toggleBtn.textContent = 'Buka Kamera';
                    captureBtn.style.display = 'none';
                };
                
                // Play video dengan error handling
                video.play().then(() => {
                    video.classList.add('active');
                    toggleBtn.textContent = 'Tutup Kamera';
                    captureBtn.style.display = 'block';
                }).catch(err => {
                    showAlert('attendanceAlert', `Error memutar video: ${err.message}`, 'danger');
                });
            } catch (error) {
                showAlert('attendanceAlert', `Error membuka kamera: ${error.message}. Pastikan Anda memberikan izin akses kamera.`, 'danger');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('cameraPreview');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            canvas.toBlob((blob) => {
                photoBlob = blob;
                const preview = document.getElementById('photoPreview');
                preview.src = URL.createObjectURL(blob);
                preview.classList.add('active');
                photoCaptured = true;

                // Stop camera
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                video.classList.remove('active');
                document.getElementById('toggleCameraBtn').textContent = 'Buka Kamera';
                document.getElementById('captureBtn').style.display = 'none';
                document.getElementById('retakeBtn').style.display = 'block';
            });
        }

        function retakePhoto() {
            photoCaptured = false;
            photoBlob = null;
            document.getElementById('photoPreview').classList.remove('active');
            document.getElementById('retakeBtn').style.display = 'none';
            document.getElementById('toggleCameraBtn').textContent = 'Buka Kamera';
            toggleCamera();
        }

        // ===== LOGIN =====
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                showAlert('loginAlert', 'Username dan password harus diisi', 'danger');
                return;
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentUser = data.user;
                    currentSchool = data.school;
                    document.getElementById('loginUsername').value = '';
                    document.getElementById('loginPassword').value = '';
                    getLocation();
                    navigateTo('locationSection');
                } else {
                    showAlert('loginAlert', data.message || 'Username atau password salah', 'danger');
                }
            } catch (error) {
                showAlert('loginAlert', `Error: ${error.message}`, 'danger');
            }
        }

        // ===== ATTENDANCE =====
        async function submitAttendance() {
            const attendanceType = document.getElementById('attendanceType').value;
            const submitBtn = event.target;

            if (!attendanceType) {
                showAlert('attendanceAlert', 'Pilih tipe absensi terlebih dahulu', 'danger');
                return;
            }

            if (!photoCaptured || !photoBlob) {
                showAlert('attendanceAlert', 'Ambil foto selfie terlebih dahulu', 'danger');
                return;
            }

            if (!userLocation) {
                showAlert('attendanceAlert', 'Lokasi Anda belum terdeteksi', 'danger');
                return;
            }

            // Validate location
            const distance = calculateDistance(
                userLocation.lat,
                userLocation.lon,
                parseFloat(currentSchool.latitude),
                parseFloat(currentSchool.longitude)
            );
            const radiusMeters = parseFloat(currentSchool.radiusMeters) || 100;

            if (distance > radiusMeters) {
                showAlert('attendanceAlert', `Anda berada di luar zona absensi (${distance.toFixed(0)}m dari sekolah)`, 'danger');
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Mengirim...';

            try {
                // Convert blob to base64
                const reader = new FileReader();
                reader.readAsDataURL(photoBlob);
                
                reader.onload = async function() {
                    const photoBase64 = reader.result;
                    const attendanceData = {
                        action: 'submitAttendance',
                        idPegawai: currentUser.id_pegawai,
                        namaPegawai: currentUser.nama_pegawai,
                        jabatan: currentUser.jabatan,
                        idSekolah: currentUser.id_sekolah,
                        namaSekolah: currentSchool.nama_sekolah,
                        status: attendanceType,
                        latitude: userLocation.lat,
                        longitude: userLocation.lon,
                        tanggal: new Date().toISOString().split('T')[0],
                        waktu: new Date().toTimeString().split(' ')[0],
                        photo: photoBase64
                    };

                    console.log('Mengirim data ke:', GAS_URL);
                    console.log('Data keys:', Object.keys(attendanceData));

                    try {
                        const response = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify(attendanceData)
                        });

                        console.log('Response status:', response.status);
                        const data = await response.json();
                        console.log('Response data:', data);

                        if (data.success) {
                            showAlert('attendanceAlert', `Absensi ${attendanceType} berhasil dikirim!`, 'success');
                            photoCaptured = false;
                            photoBlob = null;
                            document.getElementById('attendanceType').value = '';
                            document.getElementById('photoPreview').classList.remove('active');
                            document.getElementById('retakeBtn').style.display = 'none';
                            setTimeout(() => {
                                goToHistory();
                            }, 1500);
                        } else {
                            showAlert('attendanceAlert', data.message || 'Gagal mengirim absensi', 'danger');
                        }
                    } catch (error) {
                        console.error('Fetch error detail:', error);
                        showAlert('attendanceAlert', `Error: ${error.message}`, 'danger');
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                    }
                };

                reader.onerror = function() {
                    showAlert('attendanceAlert', 'Error mengkonversi foto', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                };
            } catch (error) {
                console.error('Error detail:', error);
                showAlert('attendanceAlert', `Error: ${error.message}`, 'danger');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        }

        // ===== HISTORY =====
        async function goToHistory() {
            navigateTo('historySection');
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getHistory',
                        idPegawai: currentUser.id_pegawai
                    })
                });

                const data = await response.json();

                if (data.success && data.records) {
                    const historyEl = document.getElementById('attendanceHistory');
                    historyEl.innerHTML = '';

                    if (data.records.length === 0) {
                        historyEl.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Belum ada riwayat absensi</p>';
                        return;
                    }

                    data.records.forEach(record => {
                        const recordEl = document.createElement('div');
                        recordEl.className = 'attendance-record';
                        recordEl.innerHTML = `
                            <h4>${record.tanggal}</h4>
                            <p><strong>Waktu:</strong> ${record.waktu}</p>
                            <p><strong>Status:</strong> <span class="status-badge ${record.status.toLowerCase()}">${record.status}</span></p>
                            <p><strong>Lokasi:</strong> ${record.latitude}, ${record.longitude}</p>
                        `;
                        historyEl.appendChild(recordEl);
                    });
                }
            } catch (error) {
                showAlert('historyInfo', `Error: ${error.message}`, 'danger');
            }
        }

        function goToAttendance() {
            document.getElementById('attendanceType').value = '';
            navigateTo('attendanceSection');
        }

        // ===== LOGOUT =====
        function handleLogout() {
            currentUser = null;
            currentSchool = null;
            userLocation = null;
            photoCaptured = false;
            photoBlob = null;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('attendanceType').value = '';
            document.getElementById('photoPreview').classList.remove('active');
            document.getElementById('cameraPreview').classList.remove('active');
            document.getElementById('toggleCameraBtn').textContent = 'Buka Kamera';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('retakeBtn').style.display = 'none';
            navigateTo('loginSection');
        }

        // ===== DISPLAY INFO ON ATTENDANCE SCREEN =====
        window.addEventListener('DOMContentLoaded', () => {
            // Observer untuk update info ketika pindah ke attendance section
            const originalNavigate = navigateTo;
            window.navigateTo = function(sectionId) {
                if (sectionId === 'attendanceSection' && currentUser && currentSchool) {
                    document.getElementById('attendanceName').textContent = currentUser.nama_pegawai;
                    document.getElementById('attendancePosition').textContent = currentUser.jabatan;
                    document.getElementById('attendanceSchool').textContent = currentSchool.nama_sekolah;
                    document.getElementById('schoolInfo').innerHTML = `
                        <p><strong>Nama Sekolah:</strong> ${currentSchool.nama_sekolah}</p>
                        <p><strong>Latitude:</strong> ${currentSchool.latitude}</p>
                        <p><strong>Longitude:</strong> ${currentSchool.longitude}</p>
                        <p><strong>Radius:</strong> ${currentSchool.radiusMeters}m</p>
                    `;
                }
                originalNavigate(sectionId);
            };
        });
    </script>
